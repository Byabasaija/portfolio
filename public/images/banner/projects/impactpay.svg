<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="72" text-anchor="middle" fill="#e9c46a" font-size="13" font-weight="600" letter-spacing="3">BULK DISBURSEMENT + SMS</text>
  <text x="600" y="112" text-anchor="middle" fill="#e5e5e5" font-size="34" font-weight="700">Impact Pay — Organizational Payments</text>

  <!-- Organization -->
  <rect x="60" y="230" width="140" height="65" rx="12" fill="#242424" stroke="#e9c46a" stroke-width="1.5"/>
  <text x="130" y="257" text-anchor="middle" fill="#e5e5e5" font-size="12" font-weight="600">Organization</text>
  <text x="130" y="275" text-anchor="middle" fill="#888" font-size="10">Loads OVA Wallet</text>
  <text x="130" y="289" text-anchor="middle" fill="#888" font-size="10">Uploads recipient list</text>

  <!-- Impact Pay core -->
  <rect x="460" y="210" width="180" height="105" rx="14" fill="#1e2a1e" stroke="#5a9a6a" stroke-width="2"/>
  <text x="550" y="245" text-anchor="middle" fill="#5a9a6a" font-size="13" font-weight="700">Impact Pay</text>
  <text x="550" y="265" text-anchor="middle" fill="#e5e5e5" font-size="11">OVA Wallet</text>
  <text x="550" y="283" text-anchor="middle" fill="#888" font-size="10">Fan-out engine</text>
  <text x="550" y="301" text-anchor="middle" fill="#888" font-size="10">Reports + Audit trail</text>

  <line x1="200" y1="262" x2="460" y2="262" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="458,256 468,262 458,268" fill="#e9c46a"/>

  <!-- Fan-out to mobile money -->
  <rect x="730" y="150" width="150" height="50" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="805" y="171" text-anchor="middle" fill="#e5e5e5" font-size="11" font-weight="600">Recipient A</text>
  <text x="805" y="187" text-anchor="middle" fill="#888" font-size="10">Mobile Money</text>

  <rect x="730" y="220" width="150" height="50" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="805" y="241" text-anchor="middle" fill="#e5e5e5" font-size="11" font-weight="600">Recipient B</text>
  <text x="805" y="257" text-anchor="middle" fill="#888" font-size="10">Mobile Money</text>

  <rect x="730" y="290" width="150" height="50" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="805" y="311" text-anchor="middle" fill="#e5e5e5" font-size="11" font-weight="600">Recipient N</text>
  <text x="805" y="327" text-anchor="middle" fill="#888" font-size="10">Mobile Money</text>

  <line x1="640" y1="248" x2="730" y2="175" stroke="#5a9a6a50" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="260" x2="730" y2="245" stroke="#5a9a6a50" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="272" x2="730" y2="315" stroke="#5a9a6a50" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Blasta SMS -->
  <rect x="460" y="360" width="180" height="70" rx="12" fill="#1e1e2a" stroke="#3a3a5a" stroke-width="1.5"/>
  <text x="550" y="388" text-anchor="middle" fill="#6a7ae9" font-size="12" font-weight="600">Blasta</text>
  <text x="550" y="406" text-anchor="middle" fill="#888" font-size="10">DmarkPay SMS Gateway</text>
  <text x="550" y="420" text-anchor="middle" fill="#888" font-size="10">Bulk broadcast</text>
  <line x1="550" y1="315" x2="550" y2="360" stroke="#6a7ae940" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- SMS recipients -->
  <rect x="730" y="375" width="150" height="45" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="805" y="397" text-anchor="middle" fill="#e5e5e5" font-size="11">SMS Audience</text>
  <text x="805" y="412" text-anchor="middle" fill="#888" font-size="10">Uploaded list</text>
  <line x1="640" y1="397" x2="730" y2="397" stroke="#6a7ae940" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="728,391 738,397 728,403" fill="#6a7ae9"/>

  <!-- Stats -->
  <rect x="160" y="480" width="190" height="65" rx="12" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="255" y="506" text-anchor="middle" fill="#e9c46a" font-size="16" font-weight="700">OVA Wallet</text>
  <text x="255" y="526" text-anchor="middle" fill="#888" font-size="11">Org-funded disbursement</text>

  <rect x="505" y="480" width="190" height="65" rx="12" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="600" y="506" text-anchor="middle" fill="#e9c46a" font-size="16" font-weight="700">Fan-out Engine</text>
  <text x="600" y="526" text-anchor="middle" fill="#888" font-size="11">Bulk mobile money</text>

  <rect x="850" y="480" width="190" height="65" rx="12" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="945" y="506" text-anchor="middle" fill="#e9c46a" font-size="16" font-weight="700">Blasta SMS</text>
  <text x="945" y="526" text-anchor="middle" fill="#888" font-size="11">Bulk communications</text>

  <line x1="80" y1="570" x2="1120" y2="570" stroke="#ffffff08" stroke-width="1"/>
  <text x="600" y="600" text-anchor="middle" fill="#444" font-size="12">byabasaija.com</text>
</svg>
