  <rect x="220" y="430" width="180" height="70" rx="12" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="310" y="458" text-anchor="middle" fill="#e9c46a" font-size="22" font-weight="700">30+</text>
  <text x="310" y="478" text-anchor="middle" fill="#888" font-size="11">SACCOs Supported</text>

  <rect x="510" y="430" width="180" height="70" rx="12" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="600" y="458" text-anchor="middle" fill="#e9c46a" font-size="22" font-weight="700">75k+</text>
  <text x="600" y="478" text-anchor="middle" fill="#888" font-size="11">Monthly Transactions</text>

  <rect x="800" y="430" width="180" height="70" rx="12" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="890" y="458" text-anchor="middle" fill="#e9c46a" font-size="22" font-weight="700">4</text>
