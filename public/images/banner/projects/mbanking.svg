  <text x="785" y="226" text-anchor="middle" fill="#888" font-size="10">Telecom Adapter</text>
  <line x1="652" y1="258" x2="720" y2="215" stroke="#6a7ae940" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Right: MTN / Airtel -->
  <rect x="880" y="165" width="100" height="40" rx="8" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
