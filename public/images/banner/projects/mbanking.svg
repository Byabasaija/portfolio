<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="72" text-anchor="middle" fill="#e9c46a" font-size="13" font-weight="600" letter-spacing="3">HEXAGONAL ARCHITECTURE</text>
  <text x="600" y="112" text-anchor="middle" fill="#e5e5e5" font-size="34" font-weight="700">Mbanking — Mobile SACCO Platform</text>

  <!-- Center hexagon (core domain) -->
  <polygon points="600,220 650,248 650,304 600,332 550,304 550,248" fill="#1e2a1e" stroke="#5a9a6a" stroke-width="2"/>
  <text x="600" y="276" text-anchor="middle" fill="#e5e5e5" font-size="12" font-weight="700">Core</text>
  <text x="600" y="292" text-anchor="middle" fill="#888" font-size="10">Domain</text>

  <!-- Left: USSD Port -->
  <rect x="80" y="255" width="110" height="50" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="135" y="275" text-anchor="middle" fill="#e9c46a" font-size="11" font-weight="600">USSD</text>
  <text x="135" y="291" text-anchor="middle" fill="#888" font-size="10">Entry Point</text>
  <line x1="190" y1="280" x2="548" y2="280" stroke="#e9c46a40" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Left: Mobile App Port -->
  <rect x="80" y="320" width="110" height="50" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="135" y="340" text-anchor="middle" fill="#e9c46a" font-size="11" font-weight="600">Mobile App</text>
  <text x="135" y="356" text-anchor="middle" fill="#888" font-size="10">REST API</text>
  <line x1="190" y1="345" x2="548" y2="295" stroke="#e9c46a40" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Left: Web Dashboard -->
  <rect x="80" y="190" width="110" height="50" rx="10" fill="#242424" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="135" y="210" text-anchor="middle" fill="#e9c46a" font-size="11" font-weight="600">Web Dashboard</text>
  <text x="135" y="226" text-anchor="middle" fill="#888" font-size="10">Monitoring</text>
  <line x1="190" y1="215" x2="548" y2="258" stroke="#e9c46a40" stroke-width="1.5" stroke-dasharray="5,3"/>

