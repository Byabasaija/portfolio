  <rect x="880" y="260" width="100" height="30" rx="6" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="930" y="279" text-anchor="middle" fill="#888" font-size="10">Core Bank A</text>
  <rect x="880" y="298" width="100" height="30" rx="6" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="930" y="317" text-anchor="middle" fill="#888" font-size="10">Core Bank B</text>
  <rect x="880" y="336" width="100" height="30" rx="6" fill="#242424" stroke="#3a3a3a" stroke-width="1"/>
  <text x="930" y="355" text-anchor="middle" fill="#888" font-size="10">Core Bank N</text>
  <line x1="850" y1="290" x2="880" y2="275" stroke="#5a9a6a30" stroke-width="1"/>
  <line x1="850" y1="295" x2="880" y2="313" stroke="#5a9a6a30" stroke-width="1"/>
  <line x1="850" y1="300" x2="880" y2="351" stroke="#5a9a6a30" stroke-width="1"/>

